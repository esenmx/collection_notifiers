name: collection_notifiers
description: >-
  Reactive collection wrappers (List, Map, Set, Queue) with ChangeNotifier
  and ValueListenable support for efficient Flutter UI rebuilds.
version: 2.3.0
repository: https://github.com/esenmx/collection_notifiers/
homepage: https://mehmetesen.com/
issue_tracker: https://github.com/esenmx/collection_notifiers/issues
topics:
  - state-management
  - flutter
  - collections
  - change-notifier
  - value-listenable

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  collection: ^1.19.1
  flutter:
    sdk: flutter
  flutter_hooks: ^0.21.3

dev_dependencies:
  checks: ^0.3.1
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.2.0
